# DOC: https://docs.github.com/en/actions/publishing-packages/publishing-docker-images
name: Build the app docker image

on:
  push

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versioning.outputs.version }}
      imageName: ${{ steps.versioning.outputs.imageName }}

    steps:
      - uses: actions/checkout@v4
      - name: Compute versions
        id: versioning
        run: |
          version=$(git rev-parse --short HEAD)
          imageName=ghcr.io/${{github.repository}}:$version
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "imageName=$imageName" >> $GITHUB_OUTPUT
          echo "the image name :'$imageName'"
          echo "## 🔖 New version '$version'" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Image '$imageName'" >> $GITHUB_STEP_SUMMARY

  # AJOUT — Tests unitaires avant de construire l'image
  unit-tests:
    runs-on: ubuntu-latest
    needs: [versioning] # Attend que le versioning soit terminé

    steps:
      # Récupère le code source
      - uses: actions/checkout@v4

      # Configure Go sur la machine virtuelle GitHub
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Lance les tests unitaires
      - name: Run unit tests
        run: go test -count=1 .

  # AJOUT — Build et push de l'image Docker
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read    # Droit de lire le code source
      packages: write   # Droit d'écrire sur le registry

    needs: [versioning, unit-tests] # Attend le versioning et les tests unitaires

    steps:
      # Récupère le code source
      - uses: actions/checkout@v4

      # Authentification au registry GitHub avec un token automatique
      - run: echo "${{secrets.GITHUB_TOKEN}}" | docker login ghcr.io -u "${{github.actor}}" --password-stdin

      # AJOUT — Build de l'image avec le nom versionné produit par versioning
      - name: Build the image
        run: docker build -t ${{needs.versioning.outputs.imageName}} .

      # AJOUT — Push de l'image vers GitHub Container Registry
      - name: Push the image
        run: docker push ${{needs.versioning.outputs.imageName}}

  api-tests:
    runs-on: ubuntu-latest
    needs: [build-and-push, versioning]

    # Le serveur backend tourne en arrière-plan pendant les tests
    services:
      backend:
        image: ${{needs.versioning.outputs.imageName}}
        credentials:
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
        ports:
        - 8080:8080

    steps:
      - uses: actions/checkout@v4

      # Configure Go sur la machine virtuelle
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # AJOUT — Lance les tests API contre le serveur en cours d'exécution
      - name: API tests
        run: |
          echo "## 🌐 API tests using ${{needs.versioning.outputs.imageName}}" >> $GITHUB_STEP_SUMMARY
          go test ./test/apitests